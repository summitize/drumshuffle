<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drumshuffle | Free Drum Notes</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <div class="blob shape-1"></div>
    <div class="blob shape-2"></div>
    <nav class="glass-nav">
        <div class="nav-container">
            <div class="brand">
                <div class="channel-icon">
                    <img src="./assets/IconYT.png" alt="Icon">
                </div>
                <h2 class="logo-text">Drum<span class="logo-s">S</span>huffle</h2>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="#" style="color: var(--accent);">Notes Library</a>
            </div>
        </div>
    </nav>
    <main style="padding-top: 120px;">
        <section class="text-center" style="margin-bottom: 50px;">
            <h1 class="gradient-text">Notes Library</h1>
            <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto;">Download accurate drum transcriptions for free. Consider tipping ₹10 to support our work!</p>
        </section>
        <div id="notes-container" style="display:flex; flex-direction:column; gap: 40px;">
            <div style="text-align: center;">Loading library...</div>
        </div>
    </main>

    <div id="donation-modal" class="modal hidden">
        <div class="modal-content liquid-card">
            <div style="text-align: right;"><button id="close-modal" class="btn-glass" style="padding: 5px 10px;">X</button></div>
            <h3 class="text-center" style="margin-bottom: 15px;">Support Drumshuffle</h3>
            <p class="text-center" style="margin-bottom: 25px; color: var(--text-secondary);">
                Downloading <strong id="modal-song-name"></strong>! <br><br> Dropping a ₹10 tip helps create more transcriptions!
            </p>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button id="modal-donate-btn" class="btn btn-primary w-100">Donate ₹10 via UPI</button>
                <button id="modal-free-btn" class="btn btn-glass w-100">No thanks, just download</button>
            </div>
        </div>
    </div>
    <script type="module" src="store.js"></script>
</body>
</html>
